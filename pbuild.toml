[config]
default = "build"

# ── Build ─────────────────────────────────────────────────────────────────────

[build]
group       = "Build"
description = "Build debug binary"
type        = "task"
command     = ["cargo", "build"]

[release]
group       = "Build"
description = "Build release binary"
type        = "task"
command     = ["cargo", "build", "--release"]

[install]
group       = "Build"
description = "Install pbuild to ~/.local/bin"
type        = "task"
deps        = ["release"]
command     = ["cargo", "install", "--path", "."]

# ── Development ───────────────────────────────────────────────────────────────

[test]
group       = "Development"
description = "Run all tests"
type        = "task"
command     = ["cargo", "test"]

[clippy]
group       = "Development"
description = "Run clippy linter"
type        = "task"
command     = ["cargo", "clippy", "--all-targets", "--", "-D", "warnings"]

[fmt]
group       = "Development"
description = "Format code"
type        = "task"
command     = ["cargo", "fmt", "--all"]

[fmt-check]
group       = "Development"
description = "Check formatting without modifying"
type        = "task"
command     = ["cargo", "fmt", "--all", "--", "--check"]

[lint]
group       = "Development"
description = "fmt-check + clippy"
type        = "task"
deps        = ["fmt-check", "clippy"]
command     = ["true"]

[check]
group       = "Development"
description = "Fast type check"
type        = "task"
command     = ["cargo", "check", "--all-targets"]

# ── Housekeeping ──────────────────────────────────────────────────────────────

[clean]
description = "Remove build artifacts"
type        = "task"
command     = ["cargo", "clean"]
